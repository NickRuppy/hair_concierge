version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      stripe-dependencies:
        dependency-type: production
        patterns:
          - "stripe"
          - "@stripe/*"
      paypal-dependencies:
        dependency-type: production
        patterns:
          - "@paypal/*"
      next-react-dependencies:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
          - "@types/react"
          - "@types/react-dom"
      supabase-dependencies:
        patterns:
          - "@supabase/*"
          - "supabase"
      ai-observability-dependencies:
        dependency-type: production
        patterns:
          - "openai"
          - "@langfuse/*"
          - "@opentelemetry/*"
          - "@sentry/*"
      production-patch-minor:
        dependency-type: production
        update-types:
          - patch
          - minor
        exclude-patterns:
          - "stripe"
          - "@stripe/*"
          - "@paypal/*"
          - "next"
          - "react"
          - "react-dom"
          - "@supabase/*"
          - "openai"
          - "@langfuse/*"
          - "@opentelemetry/*"
          - "@sentry/*"
      lint-format-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "lint-staged"
          - "husky"
      test-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor
        patterns:
          - "@playwright/*"
          - "playwright"
          - "start-server-and-test"
      typescript-tooling:
        dependency-type: development
        update-types:
          - patch
          - minor
        patterns:
          - "typescript"
          - "tsx"
          - "@types/node"
      development-patch-minor:
        dependency-type: development
        update-types:
          - patch
          - minor
        exclude-patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "lint-staged"
          - "husky"
          - "@playwright/*"
          - "playwright"
          - "start-server-and-test"
          - "typescript"
          - "tsx"
          - "@types/node"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
