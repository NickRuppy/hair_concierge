name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-placeholder' }}
  HAS_LIVE_SUPABASE_SECRETS: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
  HAS_LIVE_AI_SECRETS: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' && secrets.OPENAI_API_KEY != '' }}

jobs:
  funnel-contributor-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Enforce fork contributor paths
        env:
          IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$IS_FORK_PR" != "true" ]; then
            echo "Owner-controlled change; contributor path restriction not required."
            exit 0
          fi

          invalid_paths=""
          while IFS=$'\t' read -r change_status changed_path; do
            case "$changed_path" in
              src/funnels/packages.json|src/funnels/landing/registry.generated.ts|src/funnels/offers/registry.generated.ts) ;;
              src/funnels/landing/*.tsx|src/funnels/offers/*.tsx)
                if [ "$change_status" != "A" ]; then
                  invalid_paths="${invalid_paths}${change_status} ${changed_path} (existing variants are owner-controlled)\n"
                fi
                ;;
              public/images/funnels/*|docs/funnel-briefs/*) ;;
              *) invalid_paths="${invalid_paths}${changed_path}\n" ;;
            esac
          done < <(git diff --name-status --no-renames "$BASE_SHA...$HEAD_SHA")

          if [ -n "$invalid_paths" ]; then
            printf "Fork funnel PRs may only change approved contributor paths:\n%b" "$invalid_paths"
            exit 1
          fi

          node <<'NODE'
          const { execFileSync } = require("node:child_process")
          const { readFileSync } = require("node:fs")

          const base = JSON.parse(
            execFileSync("git", ["show", `${process.env.BASE_SHA}:src/funnels/packages.json`], {
              encoding: "utf8",
            }),
          )
          const proposed = JSON.parse(readFileSync("src/funnels/packages.json", "utf8"))
          const proposedByKey = new Map(proposed.map((item) => [item.key, item]))
          const immutableFields = ["key", "slug", "channel", "landingVariant", "offerVariant"]
          const errors = []

          for (const existing of base) {
            const next = proposedByKey.get(existing.key)
            if (!next) {
              errors.push(`Existing package removed: ${existing.key}`)
              continue
            }
            for (const field of immutableFields) {
              if (next[field] !== existing[field]) {
                errors.push(`Existing package ${existing.key} changed immutable field ${field}`)
              }
            }
          }

          if (errors.length > 0) {
            console.error(errors.join("\n"))
            process.exit(1)
          }
          NODE

          echo "Fork funnel PR stays within approved contributor paths."

  detect-ci-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      chat_eval: ${{ steps.changes.outputs.chat_eval }}
      retrieval_eval: ${{ steps.changes.outputs.retrieval_eval }}
      playwright_smoke: ${{ steps.changes.outputs.playwright_smoke }}
      security_scan: ${{ steps.changes.outputs.security_scan }}
      full_ci: ${{ steps.changes.outputs.full_ci }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: changes
        env:
          CI_BASE_REF: ${{ github.event_name == 'push' && github.event.before || '' }}
          CI_HEAD_REF: ${{ github.sha }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: node scripts/ci/changed-paths.mjs

  quality-core:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Check funnel registries
        run: npm run funnel:check
      - name: Run deterministic contract tests
        run: npm run test:contracts

  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-ci-scope, quality-core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Explain skip
        if: needs.detect-ci-scope.outputs.playwright_smoke != 'true' || env.HAS_LIVE_SUPABASE_SECRETS != 'true'
        run: |
          echo "Playwright smoke skipped."
          echo "playwright_smoke=${{ needs.detect-ci-scope.outputs.playwright_smoke }}"
          echo "HAS_LIVE_SUPABASE_SECRETS=$HAS_LIVE_SUPABASE_SECRETS"
      - name: Install dependencies
        if: needs.detect-ci-scope.outputs.playwright_smoke == 'true' && env.HAS_LIVE_SUPABASE_SECRETS == 'true'
        run: npm ci
      - name: Build app for smoke server
        if: needs.detect-ci-scope.outputs.playwright_smoke == 'true' && env.HAS_LIVE_SUPABASE_SECRETS == 'true'
        run: npm run build
      - name: Install Playwright browsers
        if: needs.detect-ci-scope.outputs.playwright_smoke == 'true' && env.HAS_LIVE_SUPABASE_SECRETS == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        if: needs.detect-ci-scope.outputs.playwright_smoke == 'true' && env.HAS_LIVE_SUPABASE_SECRETS == 'true'
        run: npx start-server-and-test 'npm run start' http://localhost:3000 'npx playwright test --grep @ci --project=chromium'
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-smoke-${{ github.run_id }}
          path: |
            test-results/
            tests/results/
            tests/screenshots/
          if-no-files-found: ignore
          retention-days: 7

  chat-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [detect-ci-scope, quality-core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Explain skip
        if: needs.detect-ci-scope.outputs.chat_eval != 'true' || env.HAS_LIVE_AI_SECRETS != 'true'
        run: |
          echo "Live chat smoke skipped."
          echo "chat_eval=${{ needs.detect-ci-scope.outputs.chat_eval }}"
          echo "HAS_LIVE_AI_SECRETS=$HAS_LIVE_AI_SECRETS"
      - name: Install dependencies
        if: needs.detect-ci-scope.outputs.chat_eval == 'true' && env.HAS_LIVE_AI_SECRETS == 'true'
        run: npm ci
      - name: Build app for smoke server
        if: needs.detect-ci-scope.outputs.chat_eval == 'true' && env.HAS_LIVE_AI_SECRETS == 'true'
        run: npm run build
      - name: Run live chat smoke eval
        if: needs.detect-ci-scope.outputs.chat_eval == 'true' && env.HAS_LIVE_AI_SECRETS == 'true'
        run: npx start-server-and-test 'npm run start' http://localhost:3000 'npm run test:chat:ci'
      - name: Upload chat artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chat-live-smoke-${{ github.run_id }}
          path: test-results/chat-eval/
          if-no-files-found: ignore
          retention-days: 7

  retrieval-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [detect-ci-scope, quality-core]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Explain skip
        if: needs.detect-ci-scope.outputs.retrieval_eval != 'true'
        run: echo "No retrieval/indexing paths changed; retrieval gate skipped."
      - name: Install dependencies
        if: needs.detect-ci-scope.outputs.retrieval_eval == 'true'
        run: npm ci
      - name: Run retrieval metrics gate
        if: needs.detect-ci-scope.outputs.retrieval_eval == 'true'
        run: npm run test:retrieval:ci
